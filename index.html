<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#04060f" />
<!-- Discourage caching of the HTML itself so mobile always picks up new deploys. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ASTRAL VANGUARD — Iron Requiem</title>
<link rel="icon" type="image/png" href="assets/capsule.png" />
<link rel="stylesheet" href="css/style.css?v=__BUILD__" />
</head>
<body>
  <div id="stage-wrap">
    <canvas id="game" width="960" height="540"></canvas>

    <!-- touch controls (shown only on touch devices) -->
    <div id="touch-ui">
      <div id="btnPower" class="tbtn">POWER</div>
      <div id="btnFire" class="tbtn fire">FIRE</div>
    </div>
    <div id="btnFull" title="Fullscreen">⛶</div>

    <div id="rotate">⟳ Rotate device to landscape</div>
  </div>

  <p id="hint">PC: Arrows/WASD move · Z/Space fire · X/Shift power-up · ESC pause &nbsp;|&nbsp; Touch: touch &amp; drag anywhere (floating virtual stick), on-screen FIRE / POWER</p>

  <script src="js/core.js?v=__BUILD__"></script>
  <script src="js/art.js?v=__BUILD__"></script>
  <script src="js/entities.js?v=__BUILD__"></script>
  <script src="js/bosses.js?v=__BUILD__"></script>
  <script src="js/stages.js?v=__BUILD__"></script>
  <script src="js/ui.js?v=__BUILD__"></script>
  <script src="js/main.js?v=__BUILD__"></script>

  <!-- Network-first service worker (HTTPS/production only) keeps mobile on the
       latest build; updateViaCache:'none' makes the SW script itself bypass the
       HTTP cache so new releases are detected promptly. -->
  <script>
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
      });
    }
  </script>
</body>
</html>
