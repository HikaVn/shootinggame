name: Deploy to GitHub Pages

# Publishes the game (static site) to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment →
#   Source = "GitHub Actions".  (The first run below also tries to enable it.)
on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel older queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache-busting: stamp a unique build id into the asset query strings so
      # browsers always fetch the freshly deployed JS/CSS instead of a cached copy.
      - name: Stamp build version
        run: sed -i "s/__BUILD__/${GITHUB_SHA::8}/g" index.html sw.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The site is the repo root (index.html + js/ css/ assets/).
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
